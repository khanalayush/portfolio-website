<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Website</title>
    <link rel="stylesheet" href="src/output.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body class="scroll-smooth bg-bg-light text-primary-text-light">
    <!-- navbar section -->
    <header class="fixed top-0 left-0 w-full bg-bg-light z-50">
      <div class="container mx-auto px-6 lg:px-12">
        <nav class="flex items-center justify-between h-16">
          <!-- left -->
          <img src="Frame 1.svg" alt="" class="w-16 h-16" />
          <!-- right -->
          <div class="flex justify-center gap-10">
            <div
              class="dropdown-menu hidden absolute top-16 left-0 w-full bg-bg-light z-40 flex flex-col items-center justify-center py-2 font-semibold md:flex md:static md:flex-row md:bg-transparent md:z-auto"
            >
              <ul
                class="flex flex-col items-center gap-10 md:flex-row md:justify-center"
              >
                <li>
                  <a
                    href="#home"
                    class="border-b-2 border-transparent hover:border-primary-blue-light cursor-pointer"
                    >Home</a
                  >
                </li>
                <li>
                  <a
                    href="#about"
                    class="border-b-2 border-transparent hover:border-primary-blue-light cursor-pointer"
                    >About</a
                  >
                </li>
                <li>
                  <a
                    href="#services"
                    class="border-b-2 border-transparent hover:border-primary-blue-light cursor-pointer"
                    >Services</a
                  >
                </li>
                <li>
                  <a
                    href="#projects"
                    class="border-b-2 border-transparent hover:border-primary-blue-light cursor-pointer"
                    >Projects</a
                  >
                </li>
                <li>
                  <a
                    href="#contact"
                    class="border-b-2 border-transparent hover:border-primary-blue-light cursor-pointer"
                    >Contact</a
                  >
                </li>
              </ul>
            </div>
            <div>
              <button
                class="bg-primary-blue-light text-white font-medium border-none rounded-md px-4 py-2 hidden whitespace-nowrap md:block hover:bg-hover-light"
              >
                Download CV
              </button>
            </div>
            <div class="toggle-button md:hidden top-4 right-4">
              <span class="material-symbols-outlined"> menu </span>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <script src="script.js"></script>
  </body>
</html>
